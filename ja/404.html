    <script type="text/javascript">
      function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return null;
      }

      function generateUUID() {
        return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
          (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16)
        );
      }

      function sendMetaCapiEventWithBeacon(eventName, eventId) {
        const payload = {
          event_name: eventName,
          event_time: Math.floor(Date.now() / 1000),
          event_id: eventId,
          action_source: "website",
          event_source_url: window.location.href,
          user_data: {
            fbc: getCookie('_fbc') || '',
            fbp: getCookie('_fbp') || ''
          }
        };

        const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });

        navigator.sendBeacon("https://api.golfswingreplay.com/api/events", blob);
      }

      document.addEventListener("DOMContentLoaded", () => {
        document.querySelectorAll(".download-button, .nav-action-btn, .hero-download-btn, .black-download-btn").forEach(button => {

            const eventId = generateUUID();

            if (typeof fbq === "function") {
              fbq('track', 'InitiateCheckout', {}, { eventID: eventId });
            }

            sendMetaCapiEventWithBeacon("InitiateCheckout", eventId);
          });
        });
      });
